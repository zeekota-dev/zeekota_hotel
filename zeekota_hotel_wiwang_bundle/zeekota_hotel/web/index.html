<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wiwang Hotel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="prompt" class="prompt hidden">
        <span id="prompt-key" class="prompt-key">E</span>
        <div class="prompt-content">
            <span id="prompt-label" class="prompt-label">Interact</span>
            <div id="prompt-guide" class="prompt-guide"></div>
        </div>
    </div>

    <main id="menu" class="menu-shell hidden">
        <section class="menu-panel">
            <header class="menu-header">
                <div>
                    <p id="menu-subtitle" class="menu-subtitle">Guest Services</p>
                    <h1 id="menu-title">Wiwang Hotel</h1>
                </div>
                <button id="menu-close" class="close-button" type="button" aria-label="Close">X</button>
            </header>
            <div id="menu-items" class="menu-items"></div>
        </section>
    </main>

    <section id="toasts" class="toasts" aria-live="polite"></section>

    <script src="app.js"></script>
</body>
</html>
